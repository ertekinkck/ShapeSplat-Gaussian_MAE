optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0005,
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 100,
    initial_epochs : 5
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/LLFFGS.yaml,
            others: {subset: 'train',norm_attribute: ['xyz','opacity','scale','rotation','sh']}},
  val : { _base_: cfgs/dataset_configs/LLFFGS.yaml,
            others: {subset: 'test', norm_attribute: ['xyz','opacity','scale','rotation','sh']}},
  test : { _base_: cfgs/dataset_configs/LLFFGS.yaml,
            others: {subset: 'test', norm_attribute: ['xyz','opacity','scale','rotation','sh']}},
            }

model : {
  NAME: Gaussian_MAE,
  group_size: 32,
  num_group: 64,
  loss: cdl2,
  attribute: ['xyz','opacity','scale','rotation','sh'],
  group_attribute: ['xyz','opacity','scale','rotation','sh'],
  soft_knn: false,
  transformer_config: {
    mask_ratio: 0.6,
    mask_type: 'rand',
    trans_dim: 384,
    encoder_dims: 384,
    depth: 12,
    drop_path_rate: 0.1,
    num_heads: 6,
    decoder_depth: 4,
    decoder_num_heads: 6,
  },
}

npoints: 2048
npoints_fps: false
total_bs : 64
step_per_update : 1
max_epoch : 100
